name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spell
          POSTGRES_PASSWORD: spell
          POSTGRES_DB: spell
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spell -d spell"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://spell:spell@localhost:5432/spell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag '$TAG'. Expected format: vMAJOR.MINOR.PATCH (example: v1.2.3)"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run DB migrations
        run: bun run --cwd packages/db db:migrate

      - name: Lint
        run: bun run ci:lint

      - name: Typecheck all packages
        run: bun run ci:typecheck

      - name: Run tests
        run: bun run ci:test

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run web smoke E2E tests
        run: bun run --cwd packages/web test:e2e

      - name: Build web
        run: bun run ci:build
